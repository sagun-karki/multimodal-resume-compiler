<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Multimodal Resume Compiler</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <header>
        <div class="header-left">
            <span class="logo-text">COMPILER // V1.0</span>
            <span class="status-badge">STABLE_STATE</span>
        </div>
        <div class="header-right">
            <div class="view-toggle">
                <span>OUTPUT:</span>
                <button class="view-btn active" id="view-render">RENDER</button>
            </div>
            <div class="format-toggle">
                <button class="format-btn active" id="btn-pdf" onclick="switchFormat('pdf')">PDF</button>
                <button class="format-btn" id="btn-png" onclick="switchFormat('png')">PNG</button>
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <span id="page-count">01 / 01 PAGE</span>
            </div>
        </div>
    </header>

    <main>
        <section class="left-panel">
            <div class="tabs">
                <button class="tab-btn active" id="tab-job" onclick="switchTab('job')">&gt;_ JOB_SPECIFICATION</button>
                <button class="tab-btn" id="tab-profile" onclick="switchTab('profile')">&gt;_ PROFILE_MARKDOWN</button>
            </div>

            <div class="editor-container active" id="editor-job">
                <textarea id="jd-editor" spellcheck="false">{{ job_description|safe }}</textarea>
            </div>
            <div class="editor-container" id="editor-profile">
                <textarea id="profile-editor" spellcheck="false">{{ profile|safe }}</textarea>
            </div>

            <div class="ats-panel" id="diagnostic-container">
                <div class="ats-header">
                    <span class="ats-label">ATS_ANALYSIS</span>
                    <span class="ats-score" id="diagnostic-score">0% MATCH</span>
                </div>
                <div class="ats-grid">
                    <div>
                        <span class="ats-col-title">VERIFIED_FOUNDRY</span>
                        <div class="ats-list" id="diagnostic-strengths"></div>
                    </div>
                    <div>
                        <span class="ats-col-title">CRITICAL_GAPS</span>
                        <div class="ats-list" id="diagnostic-gaps"></div>
                    </div>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-primary" id="compile-btn" onclick="startAnalysis()">ANALYZE ALIGNMENT</button>
                <button class="btn btn-success" id="proceed-btn" onclick="startOptimization()" style="display: none;">PROCEED TO OPTIMIZE</button>
                <button class="btn btn-danger" id="stop-btn" onclick="stopOptimization()" style="display: none;">[ STOP ]</button>
            </div>

            <div class="terminal">
                <div class="terminal-top">
                    <span class="terminal-label">AGENT_TELEMETRY_LOGS</span>
                    <button class="terminal-clear" onclick="document.getElementById('terminal-logs').innerHTML = ''">[ CLEAR ]</button>
                </div>
                <div class="terminal-logs" id="terminal-logs">
                    <div class="log-entry">
                        <span class="log-time">00:00:00</span>
                        <span class="log-type log-type-sys">SYS</span>
                        <span>Engine idle. Awaiting command.</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="right-panel">
            <div class="preview-wrapper" id="preview-wrapper">
                <iframe id="pdf-frame" class="preview-frame" src="/output/resume.pdf"></iframe>
                <img id="png-frame" class="preview-frame" src="/output/resume.png" alt="Resume PNG Preview">
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
