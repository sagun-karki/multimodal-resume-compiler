<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Multimodal Resume Compiler</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <main>
        <section class="left-panel">
            <div class="top-strip">
                <span class="logo-text">COMPILER // V1.0</span>
                <span class="status-badge">STABLE_STATE</span>
                <div class="format-toggle">
                    <button class="format-btn active" id="btn-pdf" onclick="switchFormat('pdf')">PDF</button>
                    <button class="format-btn" id="btn-png" onclick="switchFormat('png')">PNG</button>
                </div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" id="tab-job" onclick="switchTab('job')">&gt;_ JOB_SPECIFICATION</button>
                <button class="tab-btn" id="tab-profile" onclick="switchTab('profile')">&gt;_ PROFILE_MARKDOWN</button>
            </div>

            <div class="editor-container active" id="editor-job">
                <textarea id="jd-editor" spellcheck="false">{{ job_description|safe }}</textarea>
            </div>
            <div class="editor-container" id="editor-profile">
                <textarea id="profile-editor" spellcheck="false">{{ profile|safe }}</textarea>
            </div>

            <div class="ats-panel" id="diagnostic-container">
                <div class="ats-header" style="margin-bottom: 8px;">
                    <span class="ats-label">ATS_ANALYSIS</span>
                    <span class="ats-score" id="diagnostic-score">0% MATCH</span>
                </div>

                <!-- Interactive Charts Panel -->
                <div id="diagnostic-charts" style="display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
                    <div style="background: #141414; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
                        <span class="ats-col-title" style="margin-bottom: 4px; font-size: 8px; font-weight: 700;">KEYWORD MATCH DISTRIBUTION</span>
                        <div style="flex: 1; width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; position: relative;">
                            <canvas id="chart-keywords" style="max-height: 100% !important; max-width: 100% !important;"></canvas>
                        </div>
                    </div>
                    <div style="background: #141414; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
                        <span class="ats-col-title" style="margin-bottom: 4px; font-size: 8px; font-weight: 700;">TOKEN UTILIZATION RATIO</span>
                        <div style="flex: 1; width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; position: relative;">
                            <canvas id="chart-tokens" style="max-height: 100% !important; max-width: 100% !important;"></canvas>
                        </div>
                    </div>
                </div>
                
                <div id="diagnostic-pills-label" class="ats-col-title" style="margin-top: 12px; margin-bottom: 6px; display: none;">ATS TARGET KEYWORDS (TAP TO TOGGLE):</div>
                <div id="diagnostic-pills" style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;"></div>
                
                <div class="ats-col-title" style="border-top: 1px solid var(--border-color); padding-top: 12px; margin-bottom: 8px;">SECTION RECOMMENDATIONS:</div>
                <div id="diagnostic-sections" style="display: flex; flex-direction: column; gap: 12px; max-height: 240px; overflow-y: auto;">
                    <!-- Dynamic section cards -->
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-primary" id="compile-btn" onclick="startAnalysis()">ANALYZE ALIGNMENT</button>
                <button class="btn btn-success" id="proceed-btn" onclick="startOptimization()" style="display: none;">PROCEED TO OPTIMIZE</button>
                <button class="btn btn-danger" id="stop-btn" onclick="stopOptimization()" style="display: none;">[ STOP ]</button>
            </div>

            <div class="resize-handle-v" id="terminal-resizer"></div>

            <div class="terminal">
                <div class="terminal-top">
                    <span class="terminal-label">AGENT_TELEMETRY_LOGS</span>
                    <button class="terminal-clear" onclick="document.getElementById('terminal-logs').innerHTML = ''">[ CLEAR ]</button>
                </div>
                <div class="terminal-logs" id="terminal-logs">
                    <div class="log-entry">
                        <span class="log-time">00:00:00</span>
                        <span class="log-type log-type-sys">SYS</span>
                        <span>Engine idle. Awaiting command.</span>
                    </div>
                </div>
            </div>
        </section>

        <div class="resize-handle" id="main-resizer"></div>

        <section class="right-panel">
            <iframe id="pdf-frame" class="preview-frame" src="/output/resume.pdf"></iframe>
            <img id="png-frame" class="preview-frame" src="/output/resume.png" alt="Resume PNG Preview" style="display: none;">
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
